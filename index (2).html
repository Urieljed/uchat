<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#6c63ff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="uChat"/>
<link rel="manifest" href="/manifest.json"/>
<title>uChat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#0e0f13;font-family:'DM Sans',sans-serif;color:#f0f0f5;
  /* Safe area for iPhone notch */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
input,button,textarea{font-family:'DM Sans',sans-serif;-webkit-appearance:none}
button:focus,input:focus,textarea:focus{outline:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
@keyframes slideLeft{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Layout */
.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:#0e0f13;transition:transform .25s ease,opacity .25s ease}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.slide-in{animation:slideLeft .25s ease}

/* Top bar */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#16181f;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:#f0f0f5;flex:1}
.topbar-btn{width:34px;height:34px;border-radius:10px;background:#1e2028;border:1px solid rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.topbar-btn.primary{background:#6c63ff;border:none}
.back-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* Conv list */
.conv-list{flex:1;overflow-y:auto;padding:8px}
.conv-item{display:flex;align-items:center;gap:12px;padding:10px 10px;border-radius:14px;cursor:pointer;margin-bottom:2px;transition:background .12s;active:background:#1e2028}
.conv-item:active{background:#1e2028}
.conv-avatar{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative}
.conv-info{flex:1;min-width:0}
.conv-name{font-weight:600;font-size:14.5px;color:#f0f0f5;margin-bottom:3px}
.conv-preview{font-size:13px;color:#9899a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-time{font-size:11px;color:#5c5d70}
.badge{background:#6c63ff;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* Search */
.search-wrap{padding:8px 12px;flex-shrink:0}
.search-box{background:#1e2028;border:1px solid rgba(255,255,255,0.06);border-radius:12px;display:flex;align-items:center;gap:8px;padding:0 12px}
.search-box input{background:none;border:none;color:#f0f0f5;font-size:14px;width:100%;padding:10px 0}
.search-box input::placeholder{color:#5c5d70}

/* Tabs */
.tabs{display:flex;gap:6px;padding:0 12px 8px;flex-shrink:0}
.tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:600;border-radius:10px;cursor:pointer;border:none;background:none;color:#9899a8;transition:all .15s}
.tab.active{background:rgba(108,99,255,0.18);color:#9b8ffd;border:1px solid rgba(108,99,255,0.25)}

/* Chat screen */
.chat-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#16181f;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.chat-av{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.chat-name{font-weight:700;font-size:15px;font-family:'Space Grotesk',sans-serif}
.chat-status{font-size:12px;color:#9899a8}
.chat-status.online{color:#22c55e}
.chat-actions{display:flex;gap:6px;margin-left:auto}
.chat-action-btn{width:32px;height:32px;border-radius:10px;background:#1e2028;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:3px}
.msg-row{display:flex;align-items:flex-end;gap:6px;animation:msgIn .18s ease}
.msg-row.sent{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.bubble{max-width:72%;padding:9px 13px;position:relative;word-break:break-word}
.bubble.sent{background:#6c63ff;color:#fff;border-radius:16px 16px 4px 16px}
.bubble.recv{background:#1e2028;color:#f0f0f5;border-radius:16px 16px 16px 4px;border:1px solid rgba(255,255,255,0.06)}
.bubble.system{background:rgba(255,255,255,0.05);color:#9899a8;border-radius:20px;font-size:12px;padding:5px 14px;text-align:center;align-self:center;max-width:85%}
.bubble-text{font-size:14px;line-height:1.45}
.bubble-time{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
.bubble-reaction{position:absolute;bottom:-10px;right:6px;font-size:14px;background:#16181f;border-radius:20px;padding:1px 5px;border:1px solid rgba(255,255,255,0.08)}
.sender-name{font-size:11px;font-weight:600;color:#9b8ffd;margin-bottom:3px}
.date-chip{align-self:center;background:#1e2028;color:#5c5d70;font-size:11px;padding:3px 12px;border-radius:20px;margin:6px 0;flex-shrink:0}

/* React bar */
.react-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;padding-bottom:20px;background:rgba(0,0,0,0.4)}
.react-bar{background:#1e2028;border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:10px 14px;display:flex;gap:8px}
.react-btn{font-size:24px;background:none;border:none;cursor:pointer}

/* Composer */
.composer{padding:10px 12px;background:#16181f;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:8px;flex-shrink:0;padding-bottom:max(10px, env(safe-area-inset-bottom))}
.compose-input{flex:1;background:#1e2028;border:1.5px solid rgba(255,255,255,0.08);border-radius:22px;padding:10px 16px;color:#f0f0f5;font-size:14px;resize:none;max-height:100px;line-height:1.4}
.compose-input:focus{border-color:rgba(108,99,255,0.5)}
.compose-input::placeholder{color:#5c5d70}
.send-btn{width:40px;height:40px;border-radius:50%;background:#6c63ff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:transform .1s}
.send-btn:active{transform:scale(0.92)}
.send-btn:disabled{background:#252830;cursor:default}

/* Auth */
.auth-wrap{display:flex;flex-direction:column;height:100%;background:#0e0f13;padding:20px}
.auth-card{background:#16181f;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:28px 24px;animation:fadeUp .3s ease;margin:auto 0}
.auth-input{width:100%;padding:12px 14px;background:#1e2028;border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#f0f0f5;font-size:15px;margin-bottom:12px}
.auth-btn{width:100%;padding:14px;background:#6c63ff;border:none;border-radius:14px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin-top:4px}
.auth-label{font-size:12px;color:#9899a8;font-weight:500;margin-bottom:6px;display:block}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:70;display:flex;align-items:flex-end}
.modal-sheet{background:#16181f;border-radius:24px 24px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;padding:20px;animation:fadeUp .25s ease}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 18px}
.modal-title{font-weight:700;font-size:17px;margin-bottom:16px;font-family:'Space Grotesk',sans-serif}
.modal-input{width:100%;padding:11px 14px;background:#1e2028;border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#f0f0f5;font-size:14px;margin-bottom:10px}
.user-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;cursor:pointer}
.user-row:active{background:#1e2028}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.check-circle.checked{background:#6c63ff;border:none}
.modal-btn{width:100%;padding:13px;background:#6c63ff;border:none;border-radius:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:10px}
.modal-btn:disabled{background:#252830;cursor:default}

/* Online dot */
.online-dot{width:11px;height:11px;background:#22c55e;border:2.5px solid #16181f;border-radius:50%;position:absolute;bottom:-1px;right:-1px}
.group-badge{position:absolute;bottom:-2px;right:-2px;background:#6c63ff;border-radius:6px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;border:2px solid #16181f}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;opacity:.5}
.empty-icon{font-size:48px}
.empty-text{font-size:14px;color:#9899a8;text-align:center}
</style>
</head>
<body>
<div id="root"></div>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDTIVbRCIlxU3OsayOxD-LwjjzTd5ovT48",
  authDomain:"uchat-fc773.firebaseapp.com",
  projectId:"uchat-fc773",
  storageBucket:"uchat-fc773.firebasestorage.app",
  messagingSenderId:"99707957796",
  appId:"1:99707957796:web:53770d478b9c59cf559eb1"
});
const auth=firebase.auth();
const db=firebase.firestore();
</script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const AVATARS=["🌺","⚡","🌙","🎵","🎉","🚀","🔥","💡","🌊","🦋","🌸","🎯","🦁","🐯","🦊","🐻","🌈","🍀"];
const COLORS=["#2d1b4e","#1a1a2e","#2e1a0e","#2e0e1a","#1a2e1a","#0e2e1a","#2a1a2e","#1a2a2e"];
const GROUP_EMOJIS=["👨‍👩‍👧‍👦","🎯","🚀","🎉","💼","🌍","🎮","🎵","🏆","💡","🔥","⚽","🍕","✈️","📚"];
const randAv=()=>AVATARS[Math.floor(Math.random()*AVATARS.length)];
const randCol=()=>COLORS[Math.floor(Math.random()*COLORS.length)];
const convId=(a,b)=>[a,b].sort().join("_");
const nowTime=()=>new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
const fmtTime=ts=>{if(!ts)return nowTime();const d=ts.toDate?ts.toDate():new Date(ts.seconds*1000);return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});};

// ── AUTH ──
function AuthScreen(){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState(""),[ email,setEmail]=useState(""),[ pass,setPass]=useState("");
  const [err,setErr]=useState(""),[ load,setLoad]=useState(false);

  const handle=async()=>{
    if(!email||!pass)return setErr("Remplis tous les champs.");
    setLoad(true);setErr("");
    try{
      if(mode==="register"){
        if(!name)return setErr("Entre ton nom.");
        const c=await auth.createUserWithEmailAndPassword(email,pass);
        await c.user.updateProfile({displayName:name});
        await db.collection("users").doc(c.user.uid).set({uid:c.user.uid,name,email,avatar:randAv(),color:randCol(),online:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      }else{await auth.signInWithEmailAndPassword(email,pass);}
    }catch(e){
      const m={"auth/email-already-in-use":"Email déjà utilisé.","auth/weak-password":"Mot de passe trop court.","auth/user-not-found":"Compte introuvable.","auth/wrong-password":"Mot de passe incorrect.","auth/invalid-credential":"Email ou mot de passe incorrect."};
      setErr(m[e.code]||e.message);
    }finally{setLoad(false);}
  };

  return <div className="auth-wrap">
    <div style={{textAlign:"center",marginBottom:28}}>
      <div style={{width:56,height:56,background:"#6c63ff",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>💬</div>
      <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:26,color:"#f0f0f5"}}>u<span style={{color:"#9b8ffd"}}>Chat</span></span>
    </div>
    <div className="auth-card">
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:4,color:"#f0f0f5"}}>{mode==="login"?"Bienvenue 👋":"Créer un compte"}</h2>
      <p style={{fontSize:13,color:"#9899a8",marginBottom:20}}>{mode==="login"?"Connecte-toi pour continuer":"Rejoins la communauté uChat"}</p>
      {mode==="register"&&<><label className="auth-label">Nom complet</label><input className="auth-input" value={name} onChange={e=>setName(e.target.value)} placeholder="Ex: Amara Diallo"/></>}
      <label className="auth-label">Email</label>
      <input className="auth-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="toi@email.com"/>
      <label className="auth-label">Mot de passe</label>
      <input className="auth-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="••••••••"/>
      {err&&<p style={{color:"#ef4444",fontSize:12,marginBottom:10}}>⚠️ {err}</p>}
      <button className="auth-btn" onClick={handle} disabled={load}>{load?"Chargement…":mode==="login"?"Se connecter →":"Créer le compte →"}</button>
      <p style={{textAlign:"center",color:"#9899a8",fontSize:13,marginTop:14}}>
        {mode==="login"?"Pas de compte ? ":"Déjà inscrit ? "}
        <span onClick={()=>{setMode(m=>m==="login"?"register":"login");setErr("");}} style={{color:"#9b8ffd",cursor:"pointer",fontWeight:600}}>
          {mode==="login"?"S'inscrire":"Se connecter"}
        </span>
      </p>
    </div>
  </div>;
}

// ── NEW DM MODAL ──
function NewDMModal({uid,onClose,onOpen}){
  const [q,setQ]=useState(""),[ res,setRes]=useState([]);
  const search=async v=>{setQ(v);if(v.length<2)return setRes([]);const s=await db.collection("users").get();setRes(s.docs.map(d=>d.data()).filter(u=>u.uid!==uid&&(u.name.toLowerCase().includes(v.toLowerCase())||u.email.toLowerCase().includes(v.toLowerCase()))));};
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:"75vh"}}>
      <div className="modal-handle"/>
      <div className="modal-title">💬 Nouveau message</div>
      <input className="modal-input" value={q} onChange={e=>search(e.target.value)} placeholder="Chercher par nom ou email…" autoFocus/>
      <div style={{overflowY:"auto",flex:1}}>
        {res.map(u=><div key={u.uid} className="user-row" onClick={()=>{onOpen(u);onClose();}}>
          <div style={{width:42,height:42,borderRadius:13,background:u.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{u.avatar}</div>
          <div><div style={{fontSize:14,fontWeight:600}}>{u.name}</div><div style={{fontSize:12,color:"#9899a8"}}>{u.email}</div></div>
        </div>)}
        {q.length>=2&&res.length===0&&<p style={{color:"#9899a8",fontSize:13,textAlign:"center",padding:"16px 0"}}>Aucun utilisateur trouvé</p>}
      </div>
    </div>
  </div>;
}

// ── NEW GROUP MODAL ──
function NewGroupModal({uid,profile,onClose,onCreate}){
  const [step,setStep]=useState(1);
  const [gname,setGname]=useState(""),[ gemoji,setGemoji]=useState("🎉");
  const [q,setQ]=useState(""),[ users,setUsers]=useState([]),[ sel,setSel]=useState([]);
  useEffect(()=>{db.collection("users").get().then(s=>setUsers(s.docs.map(d=>d.data()).filter(u=>u.uid!==uid)));/*eslint-disable-line*/},[]);
  const toggle=u=>setSel(s=>s.find(x=>x.uid===u.uid)?s.filter(x=>x.uid!==u.uid):[...s,u]);
  const create=async()=>{
    if(!gname.trim()||sel.length===0)return;
    const members=[uid,...sel.map(u=>u.uid)];
    const mn={[uid]:profile?.name||"Moi"};sel.forEach(u=>{mn[u.uid]=u.name;});
    const ref=await db.collection("groups").add({name:gname.trim(),emoji:gemoji,color:randCol(),members,memberNames:mn,createdBy:uid,lastMsg:"Groupe créé 🎉",lastTime:firebase.firestore.FieldValue.serverTimestamp(),createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection("groups").doc(ref.id).collection("messages").add({from:"system",text:`Groupe "${gname}" créé 🎉`,type:"system",createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    onCreate(ref.id);onClose();
  };
  const filtered=users.filter(u=>!q||u.name.toLowerCase().includes(q.toLowerCase()));
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
      <div className="modal-handle"/>
      <div className="modal-title">👥 Nouveau groupe</div>
      {step===1?<>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
          {GROUP_EMOJIS.map(e=><button key={e} onClick={()=>setGemoji(e)} style={{fontSize:22,width:44,height:44,borderRadius:12,background:gemoji===e?"rgba(108,99,255,0.3)":"#1e2028",border:gemoji===e?"1.5px solid #6c63ff":"1px solid rgba(255,255,255,0.08)",cursor:"pointer"}}>{e}</button>)}
        </div>
        <input className="modal-input" value={gname} onChange={e=>setGname(e.target.value)} placeholder="Nom du groupe…"/>
        <button className="modal-btn" onClick={()=>gname.trim()&&setStep(2)} disabled={!gname.trim()}>Suivant → Ajouter des membres</button>
      </>:<>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#1e2028",borderRadius:12,marginBottom:12}}>
          <span style={{fontSize:22}}>{gemoji}</span>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{gname}</div><div style={{fontSize:12,color:"#9899a8"}}>{sel.length} membre(s)</div></div>
          <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:"#9b8ffd",fontSize:12,cursor:"pointer"}}>Modifier</button>
        </div>
        {sel.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {sel.map(u=><div key={u.uid} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(108,99,255,0.18)",border:"1px solid rgba(108,99,255,0.3)",borderRadius:20,padding:"3px 10px 3px 6px"}}>
            <span style={{fontSize:13}}>{u.avatar}</span><span style={{fontSize:12,color:"#9b8ffd"}}>{u.name}</span>
            <button onClick={()=>toggle(u)} style={{background:"none",border:"none",color:"#9899a8",cursor:"pointer",fontSize:13,marginLeft:2}}>✕</button>
          </div>)}
        </div>}
        <input className="modal-input" value={q} onChange={e=>setQ(e.target.value)} placeholder="Chercher des membres…"/>
        <div style={{overflowY:"auto",maxHeight:220}}>
          {filtered.map(u=>{const isSel=!!sel.find(x=>x.uid===u.uid);return<div key={u.uid} className="user-row" onClick={()=>toggle(u)} style={{background:isSel?"rgba(108,99,255,0.1)":"none"}}>
            <div style={{width:40,height:40,borderRadius:12,background:u.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>{u.avatar}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500}}>{u.name}</div><div style={{fontSize:12,color:"#9899a8"}}>{u.email}</div></div>
            <div className={`check-circle${isSel?" checked":""}`}>{isSel?"✓":""}</div>
          </div>;})}
        </div>
        <button className="modal-btn" onClick={create} disabled={sel.length===0}>Créer le groupe ({sel.length+1} membres)</button>
      </>}
    </div>
  </div>;
}

// ── CHAT SCREEN ──
function ChatScreen({user,profile,conv,onBack}){
  const [msgs,setMsgs]=useState([]);
  const [txt,setTxt]=useState("");
  const [reactTarget,setReactTarget]=useState(null);
  const endRef=useRef(null);
  const isGroup=conv.type==="group";
  const col=isGroup?"groups":"conversations";

  useEffect(()=>{
    const unsub=db.collection(col).doc(conv.id).collection("messages").orderBy("createdAt","asc")
      .onSnapshot(s=>setMsgs(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  },[conv.id]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs.length]);

  const send=async()=>{
    if(!txt.trim())return;
    const t=txt;setTxt("");
    await db.collection(col).doc(conv.id).collection("messages").add({from:user.uid,fromName:profile?.name||"Moi",text:t,type:"text",createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection(col).doc(conv.id).update({lastMsg:t,lastTime:firebase.firestore.FieldValue.serverTimestamp()});
  };

  const react=async(mid,em)=>{
    await db.collection(col).doc(conv.id).collection("messages").doc(mid).update({reaction:em});
    setReactTarget(null);
  };

  return <div className="screen slide-in" style={{zIndex:10}}>
    {reactTarget&&<div className="react-overlay" onClick={()=>setReactTarget(null)}>
      <div className="react-bar" onClick={e=>e.stopPropagation()}>
        {["👍","❤️","😂","😮","🔥","👏","🎉","💯"].map(e=><button key={e} className="react-btn" onClick={()=>react(reactTarget,e)}>{e}</button>)}
      </div>
    </div>}

    <div className="chat-header">
      <button className="back-btn" onClick={onBack}>←</button>
      <div className="chat-av" style={{background:conv.color}}>
        {conv.avatar}
        {isGroup&&<div className="group-badge">👥</div>}
        {!isGroup&&conv.online&&<div className="online-dot"/>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div className="chat-name" style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{conv.name}</div>
        <div className={`chat-status${!isGroup&&conv.online?" online":""}`}>
          {isGroup?`${conv.memberCount||"?"} membres`:conv.online?"En ligne":"Hors ligne"}
        </div>
      </div>
      <div className="chat-actions">
        <button className="chat-action-btn">📞</button>
        <button className="chat-action-btn">📹</button>
      </div>
    </div>

    <div className="messages">
      <div className="date-chip">Aujourd'hui</div>
      {msgs.length===0&&<div className="empty">
        <div className="empty-icon">{isGroup?"👥":"👋"}</div>
        <div className="empty-text">{isGroup?`Bienvenue dans ${conv.name} !`:`Dis bonjour à ${conv.name} !`}</div>
      </div>}
      {msgs.map((msg,i)=>{
        const sent=msg.from===user.uid;
        const sys=msg.type==="system";
        const showSender=isGroup&&!sent&&!sys&&(i===0||msgs[i-1].from!==msg.from||msgs[i-1].type==="system");
        if(sys)return <div key={msg.id} className="bubble system">{msg.text}</div>;
        return <div key={msg.id} className={`msg-row${sent?" sent":""}`}>
          {!sent&&<div className="msg-av" style={{background:conv.color}}>{conv.avatar}</div>}
          <div style={{maxWidth:"72%"}}>
            {showSender&&<div className="sender-name">{msg.fromName}</div>}
            <div className={`bubble${sent?" sent":" recv"}`} onDoubleClick={()=>setReactTarget(msg.id)} onTouchStart={()=>{}} onContextMenu={e=>{e.preventDefault();setReactTarget(msg.id);}}>
              <div className="bubble-text">{msg.text}</div>
              <div className="bubble-time">{fmtTime(msg.createdAt)}</div>
              {msg.reaction&&<div className="bubble-reaction">{msg.reaction}</div>}
            </div>
          </div>
        </div>;
      })}
      <div ref={endRef}/>
    </div>

    <div className="composer">
      <textarea className="compose-input" value={txt} onChange={e=>setTxt(e.target.value)} placeholder={isGroup?`Message dans ${conv.name}…`:`Message à ${conv.name}…`} rows={1}
        onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
        onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}/>
      <button className="send-btn" onClick={send} disabled={!txt.trim()}>➤</button>
    </div>
  </div>;
}

// ── MAIN APP ──
function App(){
  const [user,setUser]=useState(undefined);
  const [profile,setProfile]=useState(null);
  const [dmConvs,setDmConvs]=useState([]);
  const [groupConvs,setGroupConvs]=useState([]);
  const [activeConv,setActiveConv]=useState(null);
  const [search,setSearch]=useState("");
  const [tab,setTab]=useState("all");
  const [showDM,setShowDM]=useState(false);
  const [showGroup,setShowGroup]=useState(false);

  useEffect(()=>auth.onAuthStateChanged(async u=>{
    setUser(u||null);
    if(u){const s=await db.collection("users").doc(u.uid).get();if(s.exists)setProfile(s.data());await db.collection("users").doc(u.uid).update({online:true}).catch(()=>{});}
  }),[]);

  useEffect(()=>{
    if(!user)return;
    const u1=db.collection("conversations").where("members","array-contains",user.uid).onSnapshot(async s=>{
      const list=await Promise.all(s.docs.map(async d=>{const data=d.data();const oid=data.members.find(m=>m!==user.uid);let other={};if(oid){const us=await db.collection("users").doc(oid).get();if(us.exists)other=us.data();}return{id:d.id,...data,other,type:"dm"};}));
      setDmConvs(list.sort((a,b)=>(b.lastTime?.seconds||0)-(a.lastTime?.seconds||0)));
    });
    const u2=db.collection("groups").where("members","array-contains",user.uid).onSnapshot(s=>{
      setGroupConvs(s.docs.map(d=>({id:d.id,...d.data(),type:"group"})).sort((a,b)=>(b.lastTime?.seconds||0)-(a.lastTime?.seconds||0)));
    });
    return()=>{u1();u2();};
  },[user]);

  const openDM=async other=>{
    const cid=convId(user.uid,other.uid);
    const ref=db.collection("conversations").doc(cid);
    const snap=await ref.get();
    if(!snap.exists)await ref.set({members:[user.uid,other.uid],lastMsg:"",lastTime:firebase.firestore.FieldValue.serverTimestamp()});
    setActiveConv({id:cid,type:"dm",name:other.name,avatar:other.avatar,color:other.color,online:other.online});
  };

  const openGroup=g=>setActiveConv({id:g.id,type:"group",name:g.name,avatar:g.emoji,color:g.color,memberCount:g.members?.length});

  const allConvs=[...dmConvs,...groupConvs].sort((a,b)=>(b.lastTime?.seconds||0)-(a.lastTime?.seconds||0));
  const filtered=allConvs.filter(c=>{
    const n=c.type==="group"?c.name:c.other?.name||"";
    if(search&&!n.toLowerCase().includes(search.toLowerCase()))return false;
    if(tab==="dm")return c.type==="dm";
    if(tab==="groups")return c.type==="group";
    return true;
  });

  if(user===undefined)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0e0f13",flexDirection:"column",gap:12}}>
    <div style={{fontSize:42}}>💬</div><p style={{color:"#9899a8",fontSize:14}}>Chargement…</p>
  </div>;

  if(!user)return <AuthScreen/>;

  return <div className="app">
    {/* Conv list screen */}
    <div className="screen">
      {/* Header */}
      <div className="topbar">
        <div style={{width:36,height:36,background:"#6c63ff",borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>💬</div>
        <span className="topbar-title" style={{fontFamily:"'Space Grotesk',sans-serif"}}>u<span style={{color:"#9b8ffd"}}>Chat</span></span>
        <button className="topbar-btn" onClick={()=>setShowGroup(true)} title="Nouveau groupe">👥</button>
        <button className="topbar-btn primary" onClick={()=>setShowDM(true)} title="Nouveau message">✏️</button>
      </div>

      {/* Profile row */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px 6px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{width:36,height:36,borderRadius:11,background:profile?.color||"#252830",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,position:"relative"}}>
          {profile?.avatar||"👤"}
          <div style={{width:10,height:10,background:"#22c55e",border:"2px solid #0e0f13",borderRadius:"50%",position:"absolute",bottom:-1,right:-1}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:"#f0f0f5"}}>{profile?.name||user.displayName||"Moi"}</div>
          <div style={{fontSize:11,color:"#22c55e"}}>En ligne</div>
        </div>
        <button onClick={()=>auth.signOut()} style={{fontSize:12,color:"#9899a8",background:"rgba(255,255,255,0.05)",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer"}}>Déco</button>
      </div>

      <div className="search-wrap">
        <div className="search-box">
          <span style={{fontSize:14,opacity:.6}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher…"/>
        </div>
      </div>

      <div className="tabs">
        {[{k:"all",l:"Tous"},{k:"dm",l:"Messages"},{k:"groups",l:"Groupes"}].map(({k,l})=>
          <button key={k} className={`tab${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
        )}
      </div>

      <div className="conv-list">
        {filtered.length===0&&<div className="empty" style={{marginTop:40}}>
          <div className="empty-icon">💬</div>
          <div className="empty-text">Aucune conversation</div>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <button onClick={()=>setShowDM(true)} style={{background:"rgba(108,99,255,0.2)",border:"1px solid rgba(108,99,255,0.3)",borderRadius:10,color:"#9b8ffd",padding:"7px 14px",fontSize:13,cursor:"pointer"}}>✏️ Message</button>
            <button onClick={()=>setShowGroup(true)} style={{background:"rgba(108,99,255,0.2)",border:"1px solid rgba(108,99,255,0.3)",borderRadius:10,color:"#9b8ffd",padding:"7px 14px",fontSize:13,cursor:"pointer"}}>👥 Groupe</button>
          </div>
        </div>}
        {filtered.map(c=>{
          const isG=c.type==="group";
          const name=isG?c.name:c.other?.name||"...";
          const av=isG?c.emoji:c.other?.avatar;
          const col=isG?c.color:c.other?.color;
          const online=!isG&&c.other?.online;
          return <div key={c.id} className="conv-item" onClick={()=>isG?openGroup(c):openDM(c.other)}>
            <div className="conv-avatar" style={{background:col||"#252830"}}>
              {av||"👤"}
              {isG&&<div className="group-badge">👥</div>}
              {online&&<div className="online-dot"/>}
            </div>
            <div className="conv-info">
              <div className="conv-name">{name}</div>
              <div className="conv-preview">{c.lastMsg||"Démarrer la conversation…"}</div>
            </div>
            <div className="conv-meta">
              <div className="conv-time">{fmtTime(c.lastTime)}</div>
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* Chat screen */}
    {activeConv&&<ChatScreen user={user} profile={profile} conv={activeConv} onBack={()=>setActiveConv(null)}/>}

    {/* Modals */}
    {showDM&&<NewDMModal uid={user.uid} onClose={()=>setShowDM(false)} onOpen={u=>{openDM(u);setShowDM(false);}}/>}
    {showGroup&&<NewGroupModal uid={user.uid} profile={profile} onClose={()=>setShowGroup(false)} onCreate={gid=>{db.collection("groups").doc(gid).get().then(s=>{if(s.exists)openGroup({id:s.id,...s.data()});});}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
